# MySQL 数据源配置（生产环境）
# 使用方式：--spring.profiles.active=mysql
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/core_audit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${MYSQL_PASSWORD:}

  flyway:
    enabled: true