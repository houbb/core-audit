# core-audit 公共配置
server:
  port: 8108
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: core-audit

  # 默认使用 SQLite profile
  profiles:
    active: sqlite

  # Flyway 迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true

# 应用信息
info:
  app:
    name: core-audit
    version: 1.0.0
    description: Enterprise Audit Runtime for Core Platform

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
  paths-to-match: /api/**

# core-audit 自定义配置
core:
  audit:
    sdk:
      enabled: false
    # P2 Context configuration
    context:
      enabled: true
    # P7 Compliance configuration
    compliance:
      enabled: true
      integrity:
        algorithm: SHA-256
      mask:
        enabled: true
    # P8 Intelligence configuration
    intelligence:
      enabled: true
      rule:
        enabled: true
      ai:
        enabled: false
        provider: openai
        model: gpt-4o-mini
        base-url: https://api.openai.com
        api-key: ${OPENAI_API_KEY:}
    #   excluded-paths:
    #     - /actuator/health
    #     - /api/v1/audit/dashboard
